version: 1
updated: "2026-03-10"
purpose: >
  Source of truth for semantically close icon groups that require explicit
  disambiguation during dataset cleanup, manual phrase generation, and EN/RU translation.

rules:
  - Do not add broad shared terms to multiple icons in the same group without context.
  - When adding a phrase for one icon in a group, compare it against all neighbors in that group.
  - Add EN and RU phrases in pairs with the same intent.
  - Prefer differentiating phrases over generic category phrases.

groups:
  - name: navigation-location
